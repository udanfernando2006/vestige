name: Publish Tauri Installers

on:
    push:
        tags:
            - "v*" # publish when you push a version tag, e.g. v1.0.0
    workflow_dispatch: # ...or trigger it manually anytime

permissions:
    contents: write # required so tauri-action can create/upload to a GitHub Release

jobs:
    publish:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: windows-latest
                      bundles: nsis,msi
                    - platform: ubuntu-22.04
                      bundles: appimage

        runs-on: ${{ matrix.platform }}

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: ui/package-lock.json

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Rust build cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: ui/src-tauri -> target

            - name: Install Linux system dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install npm dependencies
              working-directory: ui
              run: npm ci

            - name: Build and publish Tauri app
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  projectPath: ui
                  tagName: ${{ github.ref_name }}
                  releaseName: "Vestige ${{ github.ref_name }}"
                  releaseDraft: true
                  prerelease: false
                  args: --bundles ${{ matrix.bundles }}
