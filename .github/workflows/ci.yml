name: CI

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main]

jobs:
    python:
        name: Python tests
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:18
                env:
                    POSTGRES_USER: booktracker
                    POSTGRES_PASSWORD: testpassword
                    POSTGRES_DB: vestige_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgresql+psycopg://booktracker:testpassword@localhost:5432/vestige_test
            POSTGRES_USER: booktracker
            POSTGRES_PASSWORD: testpassword
            LLM_DISCOVERY_ENABLED: "false"
            LLM_MODE: direct
            LLM_ENGINE: cloud
            LLM_PROVIDER: openrouter
            LLM_MODEL: anthropic/claude-haiku-4-5
            OPENROUTER_API_KEY: test-key-not-used
            ANTHROPIC_API_KEY: test-key-not-used
            LOG_DIR: /tmp/vestige-test-logs

        defaults:
            run:
                working-directory: scraper

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python 3.12
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: pip
                  cache-dependency-path: scraper/requirements-dev.txt

            - name: Install dependencies
              run: pip install -r requirements-dev.txt

            - name: Audit Python dependencies for known vulnerabilities
              run: pip-audit -r requirements-dev.txt

            - name: Format check
              run: black --check .

            - name: Lint
              run: ruff check .

            - name: Run tests
              run: pytest tests/

    java:
        name: Java tests
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:18
                env:
                    POSTGRES_USER: booktracker
                    POSTGRES_PASSWORD: testpassword
                    POSTGRES_DB: vestige_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            POSTGRES_USER: booktracker
            POSTGRES_PASSWORD: testpassword

        defaults:
            run:
                working-directory: api

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: maven

            - name: Make mvnw executable
              run: chmod +x mvnw

            - name: Run tests
              run: ./mvnw test
