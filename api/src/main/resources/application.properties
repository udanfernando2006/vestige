spring.application.name=vestige
server.port=8080

# DB_HOST defaults to localhost for local dev; set to postgres in Docker Compose
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/vestige
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# validate: confirms entities match the existing schema; never modifies it
# Use update only if you need Hibernate to create tables (before running Python pipeline)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Serialize LocalDateTime as ISO-8601 strings, not arrays
# Omit null fields from JSON responses
spring.jackson.default-property-inclusion=non_null

management.endpoints.web.exposure.include=health

vestige.log-dir=${LOG_DIR:logs}
vestige.scraper-url=${SCRAPER_URL:http://scraper-server:8000}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Actuator-specific CORS config
management.endpoints.web.cors.allowed-origin-patterns=http://localhost:*,http://tauri.localhost,tauri://localhost
management.endpoints.web.cors.allowed-methods=GET,OPTIONS