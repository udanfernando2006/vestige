# ─────────────────────────────────────────────────────────────────────────────
# Vestige — docker-compose.yml
#
# Three services:
#   postgres  — always starts; shared by API and scraper
#   api       — always starts; serves the Spring Boot REST layer on port 8080
#   scraper   — manual only (profile: manual); one-shot pipeline container
#
# Usage:
#   docker-compose up                       start postgres + api
#   docker-compose run scraper              run one scrape cycle manually
#   docker-compose run scraper python tools/discover_selectors.py --pair-id 3 --commit                 run selector discovery for a pair
#   docker-compose down                     stop everything
#
# All secrets come from the .env file in the project root.
# Never commit .env — it is gitignored. Use .env.example as a template.
# ─────────────────────────────────────────────────────────────────────────────

services:
    # ── PostgreSQL 18 ───────────────────────────────────────────────────────────
    postgres:
        image: postgres:18
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: vestige
        ports:
            # Expose to host so you can connect with psql, DBeaver, etc. during development.
            # Remove this in production — only the api and scraper containers need access.
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql
        healthcheck:
            # depends_on with condition: service_healthy waits for this to pass before
            # starting api or scraper, preventing connection errors on fresh boot.
            test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d vestige"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 30s
        restart: unless-stopped

    # ── Spring Boot API ─────────────────────────────────────────────────────────
    api:
        image: ghcr.io/udanfernando2006/vestige-api:latest
        build:
            context: ./api
            cache_from:
                - type=gha,scope=api
            cache_to:
                - type=gha,mode=max,scope=api
        ports:
            - "8080:8080"
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            # DB_HOST overrides 'localhost' in application.properties for the container network.
            # The Spring Boot datasource URL is:
            #   jdbc:postgresql://${DB_HOST:localhost}:5432/vestige
            DB_HOST: postgres
            # Shared log directory — the API reads run summaries that the scraper writes here.
            LOG_DIR: /app/logs
            # Command used by POST /api/runs/trigger to invoke the pipeline.
            # In Docker this doesn't work out of the box (Spring Boot cannot exec into the
            # scraper container as a subprocess). For development, run Spring Boot directly
            # on the host (not in Docker) so ProcessBuilder can reach the Python venv, OR
            # trigger scraper runs manually with: docker-compose run scraper
            PIPELINE_CMD: ${PIPELINE_CMD:-python scraper/main.py}
            DISCOVER_CMD: ${DISCOVER_CMD:-python scraper/tools/discover_selectors.py}
            PYTHONIOENCODING: utf-8
            SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
        volumes:
            # Mount the logs directory so the API can serve run history from the same
            # files that the scraper writes to.
            - ./logs:/app/logs
        depends_on:
            postgres:
                condition: service_healthy
        restart: unless-stopped

    # ── Python scraper pipeline ─────────────────────────────────────────────────
    # profile: manual means this container does NOT start with `docker-compose up`.
    # Run it on demand: docker-compose run scraper
    # Schedule it externally: cron / systemd timer calls docker-compose run scraper
    scraper:
        image: ghcr.io/udanfernando2006/vestige-scraper:latest
        build:
            context: ./scraper
            cache_from:
                - type=gha,scope=scraper
            cache_to:
                - type=gha,mode=max,scope=scraper
        environment:
            # Database
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/vestige

            # LLM configuration — all values fall back to .env defaults if unset
            LLM_DISCOVERY_ENABLED: ${LLM_DISCOVERY_ENABLED:-false}
            LLM_MODE: ${LLM_MODE:-direct}
            LLM_ENGINE: ${LLM_ENGINE:-cloud}
            LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
            LLM_MODEL: ${LLM_MODEL:-anthropic/claude-haiku-4-5}
            OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
            ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
            # host.docker.internal resolves to the host machine from inside a container —
            # used when Ollama is running on the host rather than in another container.
            OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

            # Email notifications
            SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
            SMTP_USER: ${SMTP_USER:-}
            SMTP_PASSWORD: ${SMTP_PASSWORD:-}
            NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}

            # Log directory inside the container — matches the volume mount below
            LOG_DIR: /app/logs
            PYTHONIOENCODING: utf-8

            # Books configuration
            BOOKS_CONFIG_PATH: /app/books_config.json

        volumes:
            # Bind-mount the host logs/ directory so:
            #   - Scraper writes logs to the host filesystem (survives container restarts)
            #   - API container reads the same files via its own logs mount above
            #   - You can inspect logs directly on the host without exec-ing into a container
            - ./logs:/app/logs
            - ./books_config.json:/app/books_config.json:ro
        depends_on:
            postgres:
                condition: service_healthy
        profiles:
            - manual

volumes:
    postgres_data:
